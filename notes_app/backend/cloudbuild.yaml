steps:
  # 1. Membuat image dari Dockerfile
  - name: "gcr.io/cloud-builders/docker"
    dir: "notes_app/backend"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/tcc-rafa", "."]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tcc-rafa'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'rafa'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tcc-rafa'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'

images:
  - 'gcr.io/$PROJECT_ID/tcc-rafa'

options:
  logging: CLOUD_LOGGING_ONLY
