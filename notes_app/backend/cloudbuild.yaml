steps:
  # 1. Membuat image dari Dockerfile
  - name: "gcr.io/cloud-builders/docker"
    dir: "notes_app/backend"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/tcc-rafa", "."]

  # 2. Meng-upload/push image ke Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/tcc-rafa"]

  # 3. Melakukan deploy ke Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "rafa",
        "--image",
        "gcr.io/$PROJECT_ID/tcc-rafa",
        "--timeout",
        "1000s",
        "--port",
        "3000",
        "--region",
        "asia-southeast1",
        "--allow-unauthenticated",
      ]

options:
  logging: CLOUD_LOGGING_ONLY
